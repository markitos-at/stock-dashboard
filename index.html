<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Board</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="text-white">

  <div class="container text-center">
    <h1 class="text-2xl mb-6 text-center">📈 Stock Check</h1>

    <div id="stocks" class="space-y-3"></div>
  </div>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSNyk88km-5bG4EIzBNezvRHjmiZS4roGe_l3hb_0dexC_l4yC25shHbmxsmqWP3GUBdYU466lnaGok/pub?output=csv";

    async function loadStocks() {
      const res = await fetch(SHEET_URL);
      const text = await res.text();
      console.log('price.updated');

      const rows = text.split("\n").slice(1);
      const container = document.getElementById("stocks");

      container.innerHTML = "";

      rows.forEach(row => {
        if (!row) return;

        const [ticker, price, change] = row.split(",");

        const changeNum = parseFloat(change);
        const isValid = !isNaN(changeNum);

        let arrow = "";
        let formattedChange = "--";

        let statusClass = "neutral";

        if (isValid) {
          statusClass = changeNum >= 0 ? "up" : "down";
          const isUp = changeNum >= 0;

          // color = isUp ? "text-green-400" : "text-red-400";
          // bg = isUp ? "bg-green-500/10" : "bg-red-500/10";
          arrow = isUp ? "▲" : "▼";
          formattedChange = `${isUp ? "+" : ""}${(changeNum * 100).toFixed(2)}%`;
        }

        container.innerHTML += `
          <div class="stock ${statusClass}">
            <div>
              <div class="ticker">${ticker}</div>
              <div class="change ${statusClass}">
                ${arrow} ${formattedChange}
              </div>
            </div>
            <div class="price">
              $${parseFloat(price).toFixed(2)}
            </div>
          </div>
        `;
      });
    }

    loadStocks();
    setInterval(loadStocks, 90000); // refresh every 90 sec
  </script>

</body>

</html>
