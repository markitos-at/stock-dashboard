<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Board</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js" defer></script>
</head>

<body class="text-white">
  <div class="container text-center">
    <h1 class="text-2xl text-center">📈 Stock Check</h1>

    <div id="stocks" class="space-y-3"></div>

    <div class="action-buttons">
      <button id="toggleFormBtn" class="toggle-btn">
        ➕ Add Option
      </button>

      <button id="toggleImportExportBtn" class="toggle-btn">
        📦 Import / Export
      </button>
    </div>

    <div id="sectionAddOption" class="hidden">
      <form id="optionForm" class="option-form">
        <input type="text" id="tickerInput" placeholder="Ticker (e.g. FROG)" autocapitalize="characters" required />

        <select id="typeInput">
          <option value="CALL">CALL</option>
          <option value="PUT">PUT</option>
        </select>

        <input type="number" id="strikeInput" placeholder="Strike" min="10" max="1000" required />

        <input type="text" id="expiryInput" placeholder="Expiry (e.g. 17.8.)" />

        <button type="submit">Save</button>
      </form>
    </div>

    <div id="importExportSection" class="hidden">
      <div class="import-export">
        <div>Export</div>
        <div class="export-container position-relative">
          <textarea id="exportOutput" readonly placeholder="Export will appear here..."></textarea>
          <button id="copyBtn">📋</button>
        </div>
        <button id="exportBtn">📤 Export Options</button>

        <div class="import-title">Import</div>
        <textarea id="importInput" placeholder="Paste options JSON here..."></textarea>

        <button id="importBtn">📥 Import (Replace)</button>
      </div>
    </div>
  </div>
  <footer id="statusBar" class="status-bar text-center">
    Status: <span class="status">Loading...</span>
    <span class="separator">|</span>
    <span class="date"></span>
  </footer>
</body>

</html>
