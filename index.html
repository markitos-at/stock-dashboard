<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Board</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js" defer></script>
</head>

<body class="text-white">
  <div class="container text-center">
    <h1 class="text-2xl text-center">📈 Stock Check</h1>

    <div id="stocks" class="space-y-3"></div>

    <button id="toggleFormBtn" class="toggle-btn">
      ➕ Add Option
    </button>

    <form id="optionForm" class="option-form hidden">
      <input type="text" id="tickerInput" placeholder="Ticker (e.g. FROG)" autocapitalize="characters" required />

      <select id="typeInput">
        <option value="CALL">CALL</option>
        <option value="PUT">PUT</option>
      </select>

      <input type="number" id="strikeInput" placeholder="Strike" required />

      <input type="text" id="expiryInput" placeholder="Expiry (e.g. May)" />

      <button type="submit">Save</button>
    </form>
  </div>
</body>

</html>
