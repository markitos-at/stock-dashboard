<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stock Board</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-start justify-center p-4">

  <div class="container text-center">
    <h1 class="text-2xl mb-6 text-center">📈 Stock Check</h1>
    
    <div id="stocks" class="space-y-3"></div>
  </div>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSNyk88km-5bG4EIzBNezvRHjmiZS4roGe_l3hb_0dexC_l4yC25shHbmxsmqWP3GUBdYU466lnaGok/pub?output=csv";

    async function loadStocks() {
      const res = await fetch(SHEET_URL);
      const text = await res.text();
      console.log('price.updated');

      const rows = text.split("\n").slice(1);
      const container = document.getElementById("stocks");

      container.innerHTML = "";

      rows.forEach(row => {
        if (!row) return;

        const [ticker, price] = row.split(",");

        container.innerHTML += `
          <div class="flex justify-between items-center bg-gray-800 p-4 rounded-2xl">
            <span class="font-semibold text-lg">${ticker}</span>
            <span class="text-xl font-bold">$${parseFloat(price).toFixed(2)}</span>
          </div>
        `;
      });
    }

    loadStocks();
    setInterval(loadStocks, 90000); // refresh every 60 sec
  </script>

</body>
</html>
